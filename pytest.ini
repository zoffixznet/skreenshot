[pytest]
testpaths = tests
pythonpath = src
addopts = -p no:cacheprovider
markers =
    e2e: end-to-end tests that need Xvfb, xdotool, xclip and ImageMagick
    e2e_wayland: end-to-end tests on a nested kwin_wayland (needs kwin_wayland, Xvfb, xdotool, dbus-daemon)
# Unit tests never touch the live display; e2e tests spawn their own Xvfb
# (and, for the wayland suite, a nested compositor inside it).
